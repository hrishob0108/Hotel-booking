<div class="dashboard-layout">
  <!-- Sidebar / Nav -->
  <header class="top-nav glass-card">
    <div class="nav-brand">
      <div class="nav-logo">
        <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="10" fill="url(#navGrad)"/>
          <path d="M7 22L16 8L25 22H7Z" fill="white" fill-opacity="0.9"/>
          <circle cx="16" cy="17" r="3" fill="white"/>
          <defs>
            <linearGradient id="navGrad" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#6c63ff"/>
              <stop offset="100%" stop-color="#ff6584"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="nav-title">StayEase</span>
    </div>
    <div class="nav-center">
      <h2>Available Hotels</h2>
      <p class="nav-date">{{ currentDate }}</p>
    </div>
    <div class="nav-right">
      <div class="user-chip">
        <div class="user-avatar">{{ username[0].toUpperCase() }}</div>
        <span class="user-name">{{ username }}</span>
        <span class="role-badge">USER</span>
      </div>
      <button class="btn-secondary logout-btn" (click)="logout()" id="user-logout-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Find Your Perfect Stay <span class="text-gradient">✨</span></h1>
        <p class="page-subtitle">Select a date from any hotel's weekly calendar, then book your stay in one click.</p>
      </div>
      <div class="header-actions">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" placeholder="Search hotels..." (input)="onSearch($event)" [value]="searchQuery" />
        </div>
        <div class="filter-chips">
          <button class="chip" [class.active]="activeFilter === 'all'" (click)="setFilter('all')">All</button>
          <button class="chip" [class.active]="activeFilter === 'budget'" (click)="setFilter('budget')">Budget</button>
          <button class="chip" [class.active]="activeFilter === 'luxury'" (click)="setFilter('luxury')">Luxury</button>
          <button class="chip mine" [class.active]="activeFilter === 'mine'" (click)="setFilter('mine')">My Bookings</button>
        </div>
      </div>
    </div>

    <div class="hotels-grid">
      <app-hotel-card
        *ngFor="let hotel of filteredHotels; let i = index"
        [hotel]="hotel"
        [style.animation-delay]="(i * 0.1) + 's'"
      ></app-hotel-card>
      
      <!-- Empty state for search -->
      <div class="no-results" *ngIf="filteredHotels.length === 0">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        <p>No hotels found matching your search.</p>
        <button class="btn-secondary" (click)="resetSearch()">Clear all filters</button>
      </div>
    </div>
  </main>
</div>
