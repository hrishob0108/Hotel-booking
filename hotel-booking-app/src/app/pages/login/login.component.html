<div class="auth-page">
  <!-- Animated background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="auth-container fade-in-up">
    <!-- Logo / Branding -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="10" fill="url(#brandGrad)"/>
          <path d="M7 22L16 8L25 22H7Z" fill="white" fill-opacity="0.9"/>
          <circle cx="16" cy="17" r="3" fill="white"/>
          <defs>
            <linearGradient id="brandGrad" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#6c63ff"/>
              <stop offset="100%" stop-color="#ff6584"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="brand-text">
        <h1>StayEase</h1>
        <p>Premium Hotel Booking</p>
      </div>
    </div>

    <!-- Login Card -->
    <div class="auth-card glass-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate class="auth-form">
        <!-- Username -->
        <div class="field-group">
          <label for="username">Username</label>
          <div class="input-wrapper" [class.error]="usernameCtrl.invalid && usernameCtrl.touched">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input id="username" type="text" formControlName="username" placeholder="Enter your username" autocomplete="username">
          </div>
          <span class="field-error" *ngIf="usernameCtrl.invalid && usernameCtrl.touched">
            Username is required
          </span>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrapper" [class.error]="passwordCtrl.invalid && passwordCtrl.touched">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Enter your password" autocomplete="current-password">
            <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
              <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" *ngIf="passwordCtrl.invalid && passwordCtrl.touched">
            Password is required
          </span>
        </div>

        <!-- Error Alert -->
        <div class="error-alert" *ngIf="errorMessage">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMessage }}
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary submit-btn" [disabled]="isLoading">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="loading-state">
            <span class="spinner"></span>
            Authenticating...
          </span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/signup">Sign Up</a></p>
      </div>
    </div>
  </div>
</div>
