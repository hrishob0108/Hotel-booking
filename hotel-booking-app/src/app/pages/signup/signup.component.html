<div class="auth-page">
  <!-- Animated background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <div class="auth-container fade-in-up">
    <div class="auth-card glass-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="10" fill="url(#signupGrad)"/>
            <path d="M7 22L16 8L25 22H7Z" fill="white" fill-opacity="0.9"/>
            <circle cx="16" cy="17" r="3" fill="white"/>
            <defs>
              <linearGradient id="signupGrad" x1="0" y1="0" x2="32" y2="32">
                <stop offset="0%" stop-color="#6c63ff"/>
                <stop offset="100%" stop-color="#ff6584"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>Create Account</h1>
        <p>Join StayEase and find your next adventure.</p>
      </div>

      <form [formGroup]="signupForm" (ngSubmit)="onSignup()" novalidate class="auth-form">
        <!-- Username -->
        <div class="field-group">
          <label for="username">Username</label>
          <div class="input-wrapper" [class.error]="f['username'].invalid && f['username'].touched">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" formControlName="username" placeholder="Choose a username" required>
          </div>
          <span class="field-error" *ngIf="f['username'].invalid && f['username'].touched">
            Username must be at least 3 characters
          </span>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrapper" [class.error]="f['password'].invalid && f['password'].touched">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password" placeholder="At least 6 characters" required>
            <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
              <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" *ngIf="f['password'].invalid && f['password'].touched">
            Password must be at least 6 characters
          </span>
        </div>

        <!-- Confirm Password -->
        <div class="field-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper" [class.error]="signupForm.errors?.['mismatch'] && f['confirmPassword'].touched">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
            <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword" formControlName="confirmPassword" placeholder="Repeat your password" required>
            <button type="button" class="toggle-password" (click)="showConfirmPassword = !showConfirmPassword">
              <svg *ngIf="!showConfirmPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showConfirmPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" *ngIf="signupForm.errors?.['mismatch'] && f['confirmPassword'].touched">
            Passwords do not match
          </span>
        </div>

        <div class="error-alert" *ngIf="errorMessage">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn-primary submit-btn" [disabled]="isLoading">
          <span *ngIf="!isLoading">Create Account</span>
          <span *ngIf="isLoading" class="loading-state">
            <span class="spinner"></span>
            Registering...
          </span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a routerLink="/login">Log In</a></p>
      </div>
    </div>
  </div>
</div>
